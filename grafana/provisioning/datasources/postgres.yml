apiVersion: 1

datasources:
  - name: THQ PostgreSQL
    type: postgres
    uid: thq-postgres
    url: db:5432
    database: thq
    user: $__env{GRAFANA_PG_USER}
    jsonData:
      sslmode: disable
      postgresVersion: 1800
    secureJsonData:
      password: $__env{GRAFANA_PG_PASSWORD}
    isDefault: true
    editable: true
