services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://thq:thq@db:5432/thq
      THQ_WS_AUTH_TOKEN: ${THQ_WS_AUTH_TOKEN:?set in .env or shell}
      THQ_WS_AUTH_REQUIRED: ${THQ_WS_AUTH_REQUIRED:-true}
      # RUST_LOG: debug,thq_server=debug
      # RUST_BACKTRACE: 1
      THQ_LINE_TOPOLOGY_PATH: /app/static/join.csv
    ports:
      - "8080:8080"
    restart: unless-stopped
    env_file:
      - .env

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: thq
      POSTGRES_PASSWORD: thq
      POSTGRES_DB: thq
    volumes:
      # Mount the whole postgres directory to keep the new versioned layout
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thq -d thq"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db-data:
  grafana-data:
